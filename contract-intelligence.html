<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Schedule Revamp - Contract Intelligence">
    <title>Contract Intelligence Agent</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="contract-intelligence.css">
</head>

<body>
    <div class="app-layout" id="app-layout">

        <!-- ===== SIDEBAR NAVIGATION ===== -->
        <nav class="sidebar" id="sidebar" aria-label="Main Navigation">
            <div class="sidebar-logo">
                <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M4 22l6-10h10l-6 10H4z" fill="#FF9332" />
                    <path d="M14 10l6-10h10l-6 10H14z" fill="#FF9332" />
                </svg>
            </div>
            <div class="sidebar-nav">
                <!-- Dashboard -->
                <button class="sidebar-nav-item" title="Dashboard">
                    <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
                        <rect x="2" y="2" width="6" height="6" rx="1" />
                        <rect x="12" y="2" width="6" height="6" rx="1" />
                        <rect x="2" y="12" width="6" height="6" rx="1" />
                        <rect x="12" y="12" width="6" height="6" rx="1" />
                    </svg>
                </button>
                <!-- Signal/Map -->
                <button class="sidebar-nav-item" title="Signal Map">
                    <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
                        <circle cx="10" cy="10" r="8" />
                        <path d="M2 10h16" />
                        <path d="M10 2c2.5 2 4 5 4 8s-1.5 6-4 8c-2.5-2-4-5-4-8s1.5-6 4-8z" />
                    </svg>
                </button>
                <!-- Schedule (Active) -->
                <button class="sidebar-nav-item active" title="Schedule" id="nav-schedule">
                    <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
                        <rect x="3" y="4" width="14" height="14" rx="2" />
                        <path d="M3 8h14" />
                        <path d="M7 2v4" />
                        <path d="M13 2v4" />
                    </svg>
                </button>
                <!-- Agent Studio -->
                <button class="sidebar-nav-item" title="Agent Studio" id="nav-agent-studio"
                    onclick="window.location.href='agent-hub.html'">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                        style="transform: scale(0.85); transform-origin: center;">
                        <path d="M12 2l2.4 5.6L20 10l-5.6 2.4L12 18l-2.4-5.6L4 10l5.6-2.4L12 2z"
                            stroke-linejoin="round" />
                        <path d="M19 16l1.2 2.8L23 20l-2.8 1.2L19 24l-1.2-2.8L15 20l2.8-1.2L19 16z"
                            stroke-linejoin="round" />
                    </svg>
                </button>
                <!-- Users -->
                <button class="sidebar-nav-item" title="Users" style="position: relative;">
                    <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
                        <circle cx="10" cy="7" r="3" />
                        <path d="M4 18c0-3.3 2.7-6 6-6s6 2.7 6 6" />
                    </svg>
                    <span class="nav-dot"></span>
                </button>
                <!-- Settings -->
                <button class="sidebar-nav-item" title="Settings">
                    <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
                        <circle cx="10" cy="10" r="3" />
                        <path
                            d="M10 1.5v2m0 13v2m-6-8.5h-2m16 0h-2m-1.5-5L13 6.5m-8 7L6.5 15m9.5-2l-1.5-1.5m-11 0L5 13" />
                    </svg>
                </button>
            </div>
            <button class="sidebar-toggle" id="sidebar-toggle" title="Collapse sidebar">
                <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                    <path d="M8 2L4 6l4 4" />
                </svg>
            </button>
        </nav>

        <!-- ===== MAIN CONTENT (Split Layout) ===== -->
        <main class="main-content" style="display:flex; flex-direction:row; padding:0; height:100vh; overflow:hidden;">

            <!-- Left Scheduler Side -->
            <div id="scheduler-view"
                style="flex:1; display:flex; flex-direction:column; min-width:600px; height:100%; border-right: 1px solid #E5E7EB; position:relative; z-index:1;">

                <!-- Header -->
                <header class="header" id="page-header" style="z-index: 2;">
                    <div class="header-left">
                        <div class="breadcrumb">
                            <div class="breadcrumb-icon">
                                <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
                                    <rect x="3" y="4" width="14" height="14" rx="2" />
                                    <path d="M3 8h14" />
                                    <path d="M7 2v4" />
                                    <path d="M13 2v4" />
                                </svg>
                            </div>
                            <span class="breadcrumb-text">Schedule</span>
                        </div>
                    </div>
                    <div class="header-right">
                        <div class="header-location">
                            <span class="badge badge--brand">US Central Time</span>
                            <span class="badge badge--brand">ID: 1234</span>
                            <button class="location-dropdown" id="location-dropdown">
                                <span>#709 Columbus, Georgia</span>
                                <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2"
                                    stroke-linecap="round">
                                    <path d="M6 8l4 4 4-4" />
                                </svg>
                            </button>
                        </div>
                        <div class="header-actions">
                            <div class="header-notifications">
                                <button class="notification-icon" title="Notifications" id="notifications-btn">
                                    <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
                                        <path d="M10 2a5 5 0 00-5 5v3l-1.5 2h13L15 10V7a5 5 0 00-5-5z" />
                                        <path d="M8 17a2 2 0 004 0" />
                                    </svg>
                                </button>
                                <button class="notification-icon" title="Messages" id="messages-btn">
                                    <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
                                        <path d="M3 4h14a1 1 0 011 1v8a1 1 0 01-1 1H6l-3 3V5a1 1 0 011-1z" />
                                    </svg>
                                </button>
                            </div>
                            <div class="header-profile" id="user-profile">
                                <div class="avatar">MS</div>
                                <div class="profile-info">
                                    <div class="profile-names">
                                        <span class="profile-name">Mike Smith</span>
                                        <span class="profile-role">Franchise Owner</span>
                                    </div>
                                    <div class="profile-dropdown-icon">
                                        <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2"
                                            stroke-linecap="round">
                                            <path d="M4 5.5l3 3 3-3" />
                                        </svg>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </header>

                <!-- Toolbar -->
                <div class="toolbar" id="toolbar" style="z-index: 2;">
                    <div class="tabs-row">
                        <div class="tabs" id="tabs">
                            <a href="general.html" class="tab" data-tab="global" style="text-decoration:none;">
                                <span class="tab-label">Global</span>
                                <div class="tab-indicator"></div>
                            </a>
                            <button class="tab" data-tab="sites">
                                <span class="tab-label">Sites</span>
                                <div class="tab-indicator"></div>
                            </button>
                            <a href="index.html" class="tab active" data-tab="runsheets" id="tab-runsheets"
                                style="text-decoration:none;">
                                <span class="tab-label">Runsheets</span>
                                <div class="tab-indicator"></div>
                            </a>
                            <button class="tab" data-tab="location">
                                <span class="tab-label">Location</span>
                                <div class="tab-indicator"></div>
                            </button>
                        </div>
                        <div class="tabs-right-actions">
                            <button class="btn btn--create" id="create-btn">
                                <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"
                                    stroke-linecap="round">
                                    <path d="M8 3v10M3 8h10" />
                                </svg>
                                <span>Create</span>
                            </button>
                        </div>
                    </div>
                    <!-- Filters Row -->
                    <div class="filters-row" id="filters-row">
                        <div class="filters-left">
                            <div class="filters-controls">
                                <button class="search-input" id="search-btn" title="Search">
                                    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
                                        <circle cx="7" cy="7" r="5" />
                                        <path d="M11 11l3 3" />
                                    </svg>
                                </button>
                                <button class="filter-dropdown" id="filter-sites"><span>Sites</span><svg
                                        viewBox="0 0 10 5" fill="none" stroke="currentColor" stroke-width="1.5"
                                        stroke-linecap="round">
                                        <path d="M1 1l4 3 4-3" />
                                    </svg></button>
                            </div>
                        </div>
                        <div class="filters-right">
                            <div class="date-range" id="date-range">
                                <button class="date-range-arrow" id="date-prev" title="Previous week"><svg
                                        viewBox="0 0 5 10" fill="none" stroke="currentColor" stroke-width="1.5"
                                        stroke-linecap="round">
                                        <path d="M4 1L1 5l3 4" />
                                    </svg></button>
                                <span class="date-range-text">Jan 19 - Jan 25, 2026</span>
                                <button class="date-range-arrow" id="date-next" title="Next week"><svg
                                        viewBox="0 0 5 10" fill="none" stroke="currentColor" stroke-width="1.5"
                                        stroke-linecap="round">
                                        <path d="M1 1l3 4-3 4" />
                                    </svg></button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Calendar Grid -->
                <div class="calendar-area" id="calendar-area">
                    <div class="calendar-container">
                        <div class="calendar-header" id="calendar-header">
                            <div class="calendar-header-cell">SUN</div>
                            <div class="calendar-header-cell">MON</div>
                            <div class="calendar-header-cell">TUE</div>
                            <div class="calendar-header-cell today">WED</div>
                            <div class="calendar-header-cell">THU</div>
                            <div class="calendar-header-cell">FRI</div>
                            <div class="calendar-header-cell">SAT</div>
                        </div>
                        <div class="calendar-body" id="calendar-body">
                            <!-- Columns will be populated by JS -->
                        </div>
                    </div>
                </div>

                <!-- Legend -->
                <div class="legend" id="schedule-legend" style="border-top:1px solid #E5E7EB; margin-top: auto;">
                    <div class="legend-left">
                        <div class="legend-item">
                            <div class="legend-icon legend-icon--patrol"></div>
                            <div class="legend-label-group">
                                <span class="legend-label">Patrol</span>
                                <span class="legend-count">91</span>
                            </div>
                        </div>
                        <div class="legend-item">
                            <div class="legend-icon legend-icon--extra"></div>
                            <div class="legend-label-group">
                                <span class="legend-label">Extra Runsheet</span>
                                <span class="legend-count">18</span>
                            </div>
                        </div>
                    </div>
                    <div class="legend-right">
                        <div class="legend-item">
                            <div class="legend-icon legend-icon--completed">
                                <svg viewBox="0 0 8 8" fill="none" stroke="currentColor" stroke-width="1.5"
                                    stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M1.5 4L3.5 6L6.5 2" />
                                </svg>
                            </div>
                            <div class="legend-label-group">
                                <span class="legend-label">Completed 20</span>
                                <span class="legend-count">52</span>
                            </div>
                        </div>
                        <div class="legend-item">
                            <div class="legend-icon legend-icon--in-progress">
                                <svg viewBox="0 0 8 8" fill="none" stroke="currentColor" stroke-width="1"
                                    stroke-linecap="round">
                                    <circle cx="4" cy="4" r="2.5" stroke-dasharray="4 2" />
                                    <path d="M3 4l1 1 2-2" />
                                </svg>
                            </div>
                            <div class="legend-label-group">
                                <span class="legend-label">In progress</span>
                                <span class="legend-count">12</span>
                            </div>
                        </div>
                        <div class="legend-item">
                            <div class="legend-icon legend-icon--not-started"></div>
                            <div class="legend-label-group">
                                <span class="legend-label">Not started</span>
                                <span class="legend-count">32</span>
                            </div>
                        </div>
                        <div class="legend-item">
                            <div class="legend-icon legend-icon--unassigned"></div>
                            <div class="legend-label-group">
                                <span class="legend-label">Unassigned</span>
                                <span class="legend-count">24</span>
                            </div>
                        </div>
                        <div class="legend-item">
                            <div class="legend-icon legend-icon--splitted"></div>
                            <div class="legend-label-group">
                                <span class="legend-label">Splitted</span>
                                <span class="legend-count">6</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right CI Agent Chat Panel -->
            <aside class="chat-container">
                <div class="chat-header">
                    <div class="agent-avatar">
                        <i class="fa-solid fa-robot" style="font-size: 18px; color: white;"></i>
                    </div>
                    <div>
                        <h2>Contract Intelligence</h2>
                        <p>Agent Online</p>
                    </div>
                    <button class="icon-btn" style="margin-left:auto;" onclick="location.reload()"
                        title="Restart Scenario">
                        <i class="fa-solid fa-redo"></i>
                    </button>
                    <button class="icon-btn" onclick="window.history.back()" title="Close">
                        <i class="fa-solid fa-xmark"></i>
                    </button>
                </div>

                <div class="chat-history" id="chat-history">
                    <!-- Messages will be injected here -->
                </div>

                <div class="chat-input-area" id="chat-input-area">
                    <div class="quick-actions" id="quick-actions">
                        <!-- Action buttons injected here -->
                    </div>
                    <div class="input-wrapper">
                        <input type="text" id="user-input" placeholder="Type a property name..." disabled>
                        <button class="mic-btn" id="mic-btn" title="Voice Chat" onclick="toggleVoiceChat()"><i
                                class="fa-solid fa-microphone"></i></button>
                        <button class="send-btn" id="send-btn" disabled><i class="fa-solid fa-paper-plane"></i></button>
                    </div>
                </div>
            </aside>

        </main>
    </div>

    <!-- Modals or Popups -->
    <div class="overlay" id="overlay"></div>

    <!-- UI-Only Voice Chat Modal -->
    <div class="voice-modal" id="voice-modal">
        <div class="voice-ripple-container">
            <div class="voice-ripple"></div>
            <div class="voice-ripple delay-1"></div>
            <div class="voice-ripple delay-2"></div>
            <div class="voice-mic-core">
                <i class="fa-solid fa-microphone"></i>
            </div>
        </div>
        <p class="voice-status" id="voice-status">Listening...</p>
        <button class="voice-stop-btn" onclick="toggleVoiceChat()"><i class="fa-solid fa-xmark"></i></button>
    </div>

    <script src="app.js"></script>
    <script src="contract-intelligence.js"></script>
</body>

</html>
